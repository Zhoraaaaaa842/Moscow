<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moscow Walk</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <!-- Header -->
      <div class="sidebar-header">
        <svg class="logo" viewBox="0 0 40 40" fill="none" aria-label="Moscow Walk" width="36" height="36">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
          <path d="M10 28 L14 18 L18 24 L22 14 L26 20 L30 12" stroke="var(--color-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="22" cy="14" r="3" fill="var(--color-primary)"/>
        </svg>
        <div>
          <h1>Moscow Walk</h1>
          <p class="subtitle">Исследуй районы Москвы</p>
        </div>
      </div>

      <!-- Прогресс -->
      <div class="progress-block">
        <div class="progress-label">
          <span>Посещено районов</span>
          <strong id="visited-count">0 / 125</strong>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
      </div>

      <!-- Поиск -->
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" type="text" placeholder="Поиск района..." autocomplete="off" />
        <button id="search-clear" class="search-clear" title="Очистить">✕</button>
      </div>

      <!-- Фильтр по округу -->
      <div class="okrug-filters" id="okrug-filters"></div>

      <!-- Кнопки действий -->
      <div class="actions-row">
        <button id="btn-random" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
          Случайный
        </button>
        <button id="btn-stats" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Статистика
        </button>
      </div>

      <!-- Карточка района -->
      <div id="district-card" class="district-card hidden">
        <div class="district-card-header">
          <div>
            <span id="district-okrug-badge" class="okrug-badge"></span>
            <h2 id="district-name">—</h2>
          </div>
          <div class="card-actions">
            <button id="btn-export" class="btn-icon" title="Экспорт маршрута">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <button id="btn-visited" class="btn btn-success">✓ Был здесь</button>
          </div>
        </div>
        <div id="places-list" class="places-list"></div>
      </div>

      <!-- Панель статистики -->
      <div id="stats-panel" class="stats-panel hidden">
        <h3 class="stats-title">Статистика по округам</h3>
        <div id="stats-list" class="stats-list"></div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <p>Нажми «Случайный»<br>или кликни на карте</p>
      </div>
    </aside>

    <main id="map"></main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
