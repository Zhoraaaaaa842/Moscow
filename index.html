<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moscow Walk</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <svg class="logo" viewBox="0 0 40 40" fill="none" aria-label="Moscow Walk" width="36" height="36">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2"/>
          <path d="M10 28 L14 18 L18 24 L22 14 L26 20 L30 12" stroke="var(--color-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="22" cy="14" r="3" fill="var(--color-primary)"/>
        </svg>
        <div>
          <h1>Moscow Walk</h1>
          <p class="subtitle">Исследуй районы Москвы</p>
        </div>
      </div>

      <div class="progress-block">
        <div class="progress-label">
          <span>Посещено районов</span>
          <strong id="visited-count">0 / 125</strong>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
      </div>

      <button id="btn-random" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        Случайный район
      </button>

      <div id="district-card" class="district-card hidden">
        <div class="district-card-header">
          <h2 id="district-name">—</h2>
          <button id="btn-visited" class="btn btn-success" title="Отметить как посещённый">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Был здесь
          </button>
        </div>
        <div id="places-list" class="places-list">
          <div class="loading-skeleton">
            <div class="skel"></div><div class="skel"></div><div class="skel"></div>
          </div>
        </div>
      </div>

      <div id="empty-state" class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <p>Нажми «Случайный район»<br>или кликни на карте</p>
      </div>
    </aside>

    <!-- Map -->
    <main id="map"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
